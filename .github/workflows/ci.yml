name: CI (tests + build)

# Validation des Pull Requests vers main : tests unitaires + build,
# sans déploiement (le déploiement est géré par deploy.yml sur main).
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verifier:
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du dépôt
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installation des dépendances
        run: npm ci

      - name: Tests unitaires
        run: npm test

      - name: Build de production
        run: npm run build
