<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label="Logo FNPPR">
  <defs>
    <style>
      .navy { stroke: #15497b; }
      .orange { stroke: #e8821e; }
      .green { stroke: #5aa75a; }
      .lettre { fill: none; stroke: #15497b; stroke-width: 13; stroke-linecap: round; stroke-linejoin: round; }
      .chevron { fill: none; stroke-width: 16; stroke-linecap: round; stroke-linejoin: round; }
      .trait { fill: none; stroke-width: 3; stroke-linecap: round; }
    </style>
  </defs>

  <!-- Chevrons (haut / bas / gauche en bleu, droite en orange) -->
  <polyline class="chevron navy" points="100,48 120,28 140,48" />
  <polyline class="chevron navy" points="100,192 120,212 140,192" />
  <polyline class="chevron navy" points="48,100 28,120 48,140" />
  <polyline class="chevron orange" points="192,100 212,120 192,140" />

  <!-- Quadrant haut-gauche : grille de traits -->
  <!-- bloc haut-gauche : traits horizontaux bleus -->
  <line class="trait navy" x1="66" y1="67" x2="88" y2="67" />
  <line class="trait navy" x1="66" y1="74" x2="88" y2="74" />
  <line class="trait navy" x1="66" y1="81" x2="88" y2="81" />
  <line class="trait navy" x1="66" y1="88" x2="88" y2="88" />
  <!-- bloc haut-droite : traits verticaux verts -->
  <line class="trait green" x1="96" y1="67" x2="96" y2="88" />
  <line class="trait green" x1="103" y1="67" x2="103" y2="88" />
  <line class="trait green" x1="110" y1="67" x2="110" y2="88" />
  <line class="trait green" x1="117" y1="67" x2="117" y2="88" />
  <!-- bloc bas-gauche : traits verticaux verts -->
  <line class="trait green" x1="67" y1="96" x2="67" y2="117" />
  <line class="trait green" x1="74" y1="96" x2="74" y2="117" />
  <line class="trait green" x1="81" y1="96" x2="81" y2="117" />
  <line class="trait green" x1="88" y1="96" x2="88" y2="117" />
  <!-- bloc bas-droite : traits horizontaux bleus -->
  <line class="trait navy" x1="95" y1="96" x2="117" y2="96" />
  <line class="trait navy" x1="95" y1="103" x2="117" y2="103" />
  <line class="trait navy" x1="95" y1="110" x2="117" y2="110" />
  <line class="trait navy" x1="95" y1="117" x2="117" y2="117" />

  <!-- Quadrant haut-droite : P -->
  <path class="lettre" d="M126,66 L126,120 M126,66 h15 a15,15 0 0 1 0,30 h-15" />

  <!-- Quadrant bas-gauche : P -->
  <path class="lettre" d="M72,122 L72,176 M72,122 h15 a15,15 0 0 1 0,30 h-15" />

  <!-- Quadrant bas-droite : R -->
  <path class="lettre" d="M126,122 L126,176 M126,122 h15 a15,15 0 0 1 0,30 h-15 M129,150 L156,176" />
</svg>
